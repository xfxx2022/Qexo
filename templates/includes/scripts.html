<script src="{{ cdn_prev }}/jquery/jquery.min.js"></script>
<script src="{{ cdn_prev }}/notyf/notyf.min.js"></script>

<script src="{{ cdn_prev }}/argon/js/core/popper.min.js"></script>
<script src="{{ cdn_prev }}/bootstrap/js/bootstrap.bundle.min.js"></script>
<script src="{{ cdn_prev }}/argon/js/plugins/perfect-scrollbar.min.js"></script>
<script src="{{ cdn_prev }}/argon/js/plugins/smooth-scrollbar.min.js"></script>
<script src="{{ cdn_prev }}/argon/js/plugins/chartjs.min.js"></script>
<script src="{{ cdn_prev }}/argon/argon-dashboard.js"></script>
<script src="{{ cdn_prev }}/github-buttons/buttons.min.js"></script>
<script>
    $.ajaxSetup({data: {csrfmiddlewaretoken: '{{ csrf_token }}'}});

    var notyf = new Notyf({position: {x: 'right', y: 'top'}});

    var notifications = [];

    class KZ_Loading {
        constructor(config) {
            this.config = {
                content: 'Loading...',
                time: 0,
                ...typeof config === 'string' ? { content: config } : config
            };
            this.id = new Date().getTime().toString();
            this.state = 'hide';
            this.domTemplate = `
                <div class="modal fade" id="loaderModal-${this.id}" tabindex="-1" aria-labelledby="loaderModalLabel-${this.id}"
                     aria-hidden="true" data-bs-keyboard="false" data-bs-backdrop="static">
                    <div class="modal-dialog modal-dialog-centered">
                        <div class="modal-content" style="background: transparent; border: none;">
                            <div class="d-flex flex-column align-items-center justify-content-center" style="height: 100px;">
                                <div class="progress" style="width: 60%; height: 10px; background-color: #e9ecef;">
                                    <div class="progress-bar progress-bar-striped progress-bar-animated" style="width: 100%; animation: progress-animation 2s infinite;"></div>
                                </div>
                                <h5 style="margin-top: 10px; font-size: 1rem; color: #32325d;">${this.config.content}</h5>
                            </div>
                        </div>
                    </div>
                </div>`;
            this.appendDom();
        }

        appendDom() {
            $('body').append(this.domTemplate);
        }

        show() {
            $('body').css('overflow', 'hidden'); // Disable scrollbar
            $(`#loaderModal-${this.id}`).modal("show");
            this.state = 'show';
            if (this.config.time > 0) {
                setTimeout(() => this.hide(), this.config.time);
            }
        }

        hide(callback) {
            const modal = $(`#loaderModal-${this.id}`);
            modal.modal("hide");
            modal.on('hidden.bs.modal', () => {
                $('body').css('overflow', 'auto'); // Restore scrollbar
                this.state = 'hide';
                modal.off('hidden.bs.modal'); // Remove the event listener
                if (callback) callback();
            });
        }

        destroy() {
            setTimeout(() => {
                this.hide(() => {
                    const node = $(`#loaderModal-${this.id}`);
                    node.next().remove();
                    node.remove();
                    this.show = () => { throw new Error('Object has been destroyed!'); };
                    this.hide = () => {};
                    this.destroy = () => {};
                });
            }, 500); // Let us finish the animation
        }
    }

    var notificationTemp = `<a class="dropdown-item border-radius-md notification-item" href="@@herf@@">
                                <div class="d-flex py-1">
                                    <div class="avatar avatar-sm me-3 my-auto" style="color: #172b4d;">
                                      @@fore@@
                                    </div>
                                    <div class="d-flex flex-column justify-content-center notification-content">
                                        <span class="text-sm font-weight-normal mb-1">
                                        <span class="font-weight-bold notification-label">@@label@@</span><br>
                                        <span class="notification-text">@@content@@</span>
                                        </span>
                                        <p class="text-xs text-secondary mb-0 notification-time">
                                            <i class="fa fa-clock me-1"></i>
                                            @@time@@
                                        </p>
                                    </div>
                                </div>
                            </a>`

    function showNotifications() {
        if (!notifications.length) {
            $("#notification-board").html(notificationTemp.replace('<span class="font-weight-bold">@@label@@<br></span><br>', '').replace("@@herf@@", "#")
                .replace('@@content@@', '{{ "NO_MSG_TIP" | gettext }}').replace('@@time@@', 'Now')
                .replace('@@fore@@',
                    '<i class="fas fa-check"></i>').replace("@@label@@", "{{ "TIPS" | gettext }}"));
            $("#msg-point").css({"background": "inherit"});
        } else {
            let html = '<div class="px-3 py-1"><h6 class="text-sm text-muted m-0">{{ "HAS_MSG_TIP_1" | gettext }}' +
                '<strong class="text-primary">' + notifications.length + '</strong>{{ "HAS_MSG_TIP_2" | gettext }}' +
                '</h6></div><div class="list-group list-group-flush">';
            for (let i = 0; i < notifications.length; i++) {
                html += notificationTemp.replace('@@herf@@', "javascript:delNotification('"
                    + notifications[i]["timestamp"] + "')")
                    .replace('@@content@@', notifications[i]["content"])
                    .replace('@@time@@', notifications[i]["time"])
                    .replace('@@fore@@', `<i class="fas fa-quote-left"></i>`)
                    .replace("@@label@@", notifications[i]["label"]);
            }
            html += '<div class="px-3 py-1"><h6 class="text-sm text-primary m-0" ' +
                'style="cursor: pointer;text-align: right;" onclick="clearNotification()">{{ "CLEAR_ALL" | gettext }}' +
                '</h6></div>'
            $("#notification-board").html(html + '</div>');
            $("#msg-point").css({
                "position": "absolute", "margin-top": "-25px", "margin-left": "15px", "width":
                    "6px", "height": "6px", "background": "red", "border-radius": "50%"
            });
        }
    }

    $.ajax({
        url: "/api/get_notifications/",
        type: "get",
        success: function (res) {
            let data = res;
            if (data["status"]) {
                notifications = data["data"];
                showNotifications();
            } else {
                $("#notification-board").html(notificationTemp.replace('@@label@@', '{{ "TIPS" | gettext }}')
                    .replace("@@herf@@", "#").replace('@@content@@', '{{ "MSG_LOAD_ERROR" | gettext }}')
                    .replace('@@time@@', 'Error')
                    .replace('@@fore@@', '<i class="fa-solid fa-blender"></i>'));
            }
        }
    })

    function delNotification(timestamp) {
        $.ajax({
            url: "/api/del_notifications/",
            type: "post",
            dataType: "JSON",
            data: {"time": timestamp},
            success: function (res) {
                if (res.status) {
                    notyf.success(res.msg);
                    for (let i = 0; i < notifications.length; i++) {
                        if (notifications[i]["timestamp"] === timestamp) {
                            notifications.splice(i, 1);
                            break;
                        }
                    }
                    showNotifications();
                } else {
                    notyf.error(res.msg);
                }
            },
            error: function (res) {
                notyf.error("{{ "NETWORK_ERROR" | gettext }}");
            }
        })
    }

    function clearNotification() {
        $.ajax({
            url: "/api/clear_notifications/",
            type: "post",
            dataType: "JSON",
            success: function (res) {
                if (res.status) {
                    notyf.success(res.msg);
                    notifications = [];
                    showNotifications();
                } else {
                    notyf.error(res.msg);
                }
            },
            error: function (res) {
                notyf.error("{{ "NETWORK_ERROR" | gettext }}");
            }
        })
    }

    function escapeString(str) {
        if (str === undefined || str === null) return str;
        var temp = "";
        str = str.toString();
        if (str.length === 0) return "";
        temp = str.replace(/&/g, "&amp;");
        temp = temp.replace(/</g, "&lt;");
        temp = temp.replace(/>/g, "&gt;");
        temp = temp.replace(/\s/g, "&nbsp;");
        temp = temp.replace(/\'/g, "&#39;");
        temp = temp.replace(/\"/g, "&quot;");
        return temp
    }

    function getRFC3339() {
        let date = new Date(+new Date() + 8 * 3600 * 1000);
        let iso = date.toISOString();
        let rfc = iso.replace("Z", "+08:00");
        return rfc;
    }


    function sleepSync(ms) {
        const endTime = Date.now() + ms;
        while (1) {
            if (Date.now() > endTime) {
                return;
            }
        }
    }


    function trimSpace(array) {
        for (let i = 0; i < array.length; i++) {
            if (array[i] == null || typeof (array[i]) == "undefined") {
                array.splice(i, 1);
                i = i - 1;
            }
        }
        return array;
    }

    function scrollToTop() {
        document.body.scrollIntoView();
    }

    function checkIfDark() {
        let classList = $("body").attr("class");
        if (classList.indexOf("dark-version") !== -1) {
            return true;
        }
        return false;
    }

    function formatString(template, ...args) {
        return template.replace(/{(\d+)}/g, (match, number) => {
            return typeof args[number] !== 'undefined' ? args[number] : match;
        });
    }


    function excerpt_by_local(content, length) {
        let excerpt = content.replace(/<img[^>]*>/g, "");
        excerpt = excerpt.replace(/<iframe[^>]*>/g, "");
        excerpt = excerpt.replace(/<script[^>]*>/g, "");
        excerpt = excerpt.replace(/<style[^>]*>/g, "");
        excerpt = excerpt.replace(/<[^>]*>/g, "");
        excerpt = excerpt.replace(/\n/g, " ");
        return excerpt.substring(0, length) + (content.length > length ? "..." : "");
    }
    
    function change_lang(lang) {
        $.ajax({
            url: "/api/change_lang/",
            type: "post",
            dataType: "JSON",
            data: {"lang": lang},
            success: function (res) {
                if (res.status) {
                    notyf.success(res.msg);
                    setTimeout(function () {
                        location.reload();
                    }, 1000);
                } else {
                    notyf.error(res.msg);
                }
            },
            error: function (res) {
                notyf.error("{{ "NETWORK_ERROR" | gettext }}");
            }
        })
    }

    let qexoUploadConfigPromise = null;

    async function qexoGetUploadConfig() {
        if (!qexoUploadConfigPromise) {
            qexoUploadConfigPromise = fetch('/api/upload/config/', {
                method: 'GET',
                credentials: 'same-origin',
                cache: 'no-store',
            }).then(async response => {
                const data = await response.json();
                if (!response.ok) {
                    throw new Error(data.msg || `Upload configuration failed (${response.status})`);
                }
                return data;
            }).catch(error => {
                qexoUploadConfigPromise = null;
                throw error;
            });
        }
        return qexoUploadConfigPromise;
    }

    function qexoExtractUploadUrl(responseText, jsonPath) {
        let value = responseText;
        try {
            value = JSON.parse(responseText);
        } catch (error) {
            // CFImgBed can be configured to return a plain-text URL.
        }
        if (value !== null && typeof value === 'object' && jsonPath) {
            for (const part of jsonPath.split('.')) {
                value = value[part];
                if (value === undefined || value === null) {
                    throw new Error(`CFImgBed response does not contain ${jsonPath}`);
                }
            }
        }
        if (value !== null && typeof value === 'object') {
            throw new Error('CFImgBed returned an unsupported response');
        }
        return String(value || '').trim();
    }

    async function qexoLegacyUploadImage(file) {
        const formData = new FormData();
        formData.append('file', file, file.name);
        const response = await fetch('/api/upload/', {
            method: 'POST',
            credentials: 'same-origin',
            body: formData,
        });
        let data;
        try {
            data = await response.json();
        } catch (error) {
            if (response.status === 413) {
                throw new Error('Vercel rejected the upload because it exceeds the 4.5 MB request limit');
            }
            throw new Error(`Upload failed (${response.status})`);
        }
        if (!response.ok || !data.status) {
            throw new Error(data.msg || `Upload failed (${response.status})`);
        }
        return data;
    }

    async function qexoDirectUploadImage(file, config) {
        const uploadUrl = new URL(config.url, window.location.href);
        Object.entries(config.params || {}).forEach(([key, value]) => {
            if (value !== null && value !== undefined && value !== '') {
                uploadUrl.searchParams.set(key, value);
            }
        });

        const formData = new FormData();
        formData.append(config.field_name || 'file', file, file.name);
        const uploadResponse = await fetch(uploadUrl.toString(), {
            method: 'POST',
            headers: config.headers || {},
            body: formData,
        });
        const responseText = await uploadResponse.text();
        if (!uploadResponse.ok) {
            throw new Error(responseText || `CFImgBed upload failed (${uploadResponse.status})`);
        }

        const completeData = new FormData();
        completeData.append('remote_url', qexoExtractUploadUrl(responseText, config.json_path));
        completeData.append('name', file.name);
        completeData.append('size', String(file.size));
        completeData.append('content_type', file.type);
        const completeResponse = await fetch('/api/upload/complete/', {
            method: 'POST',
            credentials: 'same-origin',
            headers: {'X-CSRFToken': '{{ csrf_token }}'},
            body: completeData,
        });
        const result = await completeResponse.json();
        if (!completeResponse.ok || !result.status) {
            throw new Error(result.msg || `Could not record upload (${completeResponse.status})`);
        }
        return result;
    }

    async function qexoUploadImage(file) {
        if (!file || !(file.type || '').startsWith('image/')) {
            throw new Error('Only image files can be uploaded');
        }
        const uploadConfig = await qexoGetUploadConfig();
        if (uploadConfig.direct && uploadConfig.provider === 'CFImgBed') {
            return qexoDirectUploadImage(file, uploadConfig.config);
        }
        return qexoLegacyUploadImage(file);
    }

    async function qexoVditorUploadHandler(files) {
        try {
            for (const file of files) {
                const result = await qexoUploadImage(file);
                const imageText = window.vditor && window.vditor.vditor.currentMode === 'wysiwyg'
                    ? `\n<img alt="" src="${result.url}">`
                    : `\n![](${result.url})`;
                window.vditor.insertValue(imageText);
                notyf.success(result.msg);
            }
            return null;
        } catch (error) {
            return error.message || String(error);
        }
    }

    {% if error %}
        notyf.error("{{ error }}");
    {% endif %}
</script>
<style>
    @keyframes progress-animation {
        0% { width: 0; }
        50% { width: 100%; }
        100% { width: 0; }
    }
</style>
